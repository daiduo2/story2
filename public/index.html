<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白鹿疗养院数字档案</title>
  <style>
    body {
      font-family: 'Noto Serif SC', serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f0;
      color: #333;
      line-height: 1.8;
    }
    h1 {
      color: #2c5f2d;
      border-bottom: 2px solid #2c5f2d;
      padding-bottom: 10px;
    }
    .search-box {
      margin: 30px 0;
      position: relative;
    }
    #search-input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      box-sizing: border-box;
    }
    #search-form {
      display: flex;
      gap: 10px;
    }
    .search-feedback {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      animation: fadeIn 0.2s ease;
    }
    .search-found {
      background: #e8f5e9;
      color: #2c5f2d;
      border: 1px solid #a5d6a7;
    }
    .search-not-found {
      background: #ffebee;
      color: #8b0000;
      border: 1px solid #ef9a9a;
    }
    #search-history {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .search-history-item {
      display: inline-block;
      padding: 4px 12px;
      background: #e8e8e0;
      border-radius: 12px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }
    .search-history-item:hover {
      background: #d0d0c8;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    button {
      padding: 12px 24px;
      background: #2c5f2d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover {
      background: #1e401f;
    }
    .volume-list {
      margin-top: 40px;
    }
    .volume-list a {
      display: block;
      padding: 10px 0;
      color: #2c5f2d;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
    }
    .volume-list a:hover {
      color: #1e401f;
    }
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>白鹿疗养院数字档案</h1>

  <div class="search-box">
    <form id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="搜索档案..."
        autocomplete="off"
      />
      <button type="submit">搜索</button>
    </form>
    <div id="search-history"></div>
  </div>

  <div class="volume-list">
    <h2>档案卷宗</h2>
    <a href="/pages/volume-01">卷一：入院记录</a>
    <a href="/pages/volume-02">卷二：内科诊疗</a>
    <a href="/pages/volume-04">卷四：精神科观察</a>
    <a href="/pages/supplement-lin">附录：林素琴档案</a>
  </div>

  <footer>
    <p>白鹿疗养院病历数字化项目 | 内部资料</p>
  </footer>

  <script type="module" src="js/frontend.js"></script>
</body>
</html>
